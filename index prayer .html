<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Gratitude</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top, #fdf6e9 0%, #f3e6c8 45%, #e8d4a0 100%);
    font-family: 'Cormorant Garamond', serif;
    padding: 24px;
    color: #4a3722;
  }

  .card {
    max-width: 560px;
    width: 100%;
    background: #fffdf8;
    border-radius: 18px;
    padding: 56px 44px;
    box-shadow: 0 20px 60px rgba(139, 106, 44, 0.18), 0 2px 8px rgba(139, 106, 44, 0.1);
    position: relative;
    border: 1px solid rgba(200, 164, 92, 0.35);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(200, 164, 92, 0.4);
    border-radius: 12px;
    pointer-events: none;
  }

  .star {
    text-align: center;
    font-size: 34px;
    color: #c8a45c;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Frank Ruhl Libre', serif;
    text-align: center;
    font-size: 1.15rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a8823e;
    font-weight: 500;
    margin-bottom: 34px;
  }

  .prayer {
    font-size: 1.65rem;
    line-height: 1.85;
    text-align: center;
    font-weight: 500;
    color: #4a3722;
  }

  .prayer p {
    margin-bottom: 6px;
  }

  .amen {
    display: block;
    margin-top: 26px;
    font-family: 'Frank Ruhl Libre', serif;
    font-style: normal;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: #a8823e;
    font-weight: 700;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.95rem;
    color: #b39a6f;
    font-style: italic;
  }

  .signature {
    text-align: center;
    margin-top: 10px;
    font-size: 1rem;
    color: #a8823e;
    font-style: italic;
  }

  @media (max-width: 480px) {
    .card { padding: 40px 26px; }
    .prayer { font-size: 1.4rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="star">✡</div>
    <h1>A Prayer of Gratitude</h1>
    <div class="prayer">
      <p>Thank You, Hashem, for another day of work.</p>
      <p>Another day we have the opportunity</p>
      <p>to sustain our family</p>
      <p>through Your hands.</p>
      <span class="amen">Amen</span>
    </div>
    <div class="footer">Said with a grateful heart, each morning</div>
    <div class="signature">— Carol Cordero</div>
  </div>
</body>
</html>
